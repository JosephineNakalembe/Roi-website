services:
  - type: web
    name: roi-website
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true
      - key: APP_KEY
        value: base64:
      - key: APP_URL
        value: https://roi-website-1.onrender.com
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: database/database.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: errorlog
      - key: LOG_LEVEL
        value: error
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_SCHEME
        value: tls
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: elroyresins@gmail.com
      - key: MAIL_FROM_NAME
        value: ROI Store
      - key: FILESYSTEM_DISK
        value: public
      - key: PUBLIC_DISK_DRIVER
        value: s3
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: auto
      - key: AWS_BUCKET
        sync: false
      - key: AWS_ENDPOINT
        value: https://95dd5686e04670432108ce1fc3c30a4e.r2.cloudflarestorage.com
      - key: AWS_URL
        value: https://pub-043ec220a975448bb9ee3c917e2bc278.r2.dev
    startCommand: |
      mkdir -p storage/framework/{sessions,views,cache}
      mkdir -p storage/logs
      mkdir -p bootstrap/cache
      touch database/database.sqlite
      php artisan config:clear
      php artisan cache:clear
      php artisan view:clear
      php artisan storage:link --force
      php artisan migrate --force --seed
      php artisan serve --host=0.0.0.0 --port=$PORT
