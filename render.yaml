services:
  - type: web
    name: roi-website
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://roi-website-1.onrender.com
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: database/database.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: errorlog
      - key: LOG_LEVEL
        value: error
      - key: MAIL_MAILER
        value: log
      - key: FILESYSTEM_DISK
        value: public
    startCommand: |
      mkdir -p storage/framework/{sessions,views,cache}
      mkdir -p storage/logs
      mkdir -p bootstrap/cache
      touch database/database.sqlite
      php artisan config:clear
      php artisan cache:clear
      php artisan view:clear
      php artisan migrate --force --seed
      php artisan serve --host=0.0.0.0 --port=$PORT
